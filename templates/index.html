<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор предмета - Maruf Test</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            /* УСТАНОВКА ФОТО */
            background: url('/static/dushanbe.jpg') no-repeat center center fixed; 
            background-size: cover;
            margin: 0; 
            padding: 20px; 
            min-height: 100vh;
        }
        .header { 
            text-align: center; 
            margin-bottom: 40px; 
            color: white; 
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
            backdrop-filter: blur(5px);
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
            max-width: 1000px; 
            margin: 0 auto; 
        }
        .card { 
            background: rgba(255, 255, 255, 0.9); /* Эффект стекла для карточек */
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            text-align: center; 
            transition: transform 0.3s; 
            cursor: pointer; 
            text-decoration: none; 
            color: #333; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            backdrop-filter: blur(5px);
        }
        .card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 8px 25px rgba(0,0,0,0.4); 
            background: rgba(255, 255, 255, 1);
        }
        .icon { font-size: 50px; margin-bottom: 15px; }
        h3 { margin: 10px 0; color: #2c3e50; }
        .btn-start { 
            background: #28a745; 
            color: white; 
            padding: 8px 20px; 
            border-radius: 20px; 
            font-size: 14px; 
            margin-top: 10px; 
            font-weight: bold;
        }
        .logout-link { 
            display: block; 
            text-align: center; 
            margin-top: 30px; 
            color: white; 
            text-decoration: none; 
            font-weight: bold;
            text-shadow: 1px 1px 5px rgba(0,0,0,1);
            background: rgba(231, 76, 60, 0.8);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 10px 20px;
            border-radius: 10px;
        }
        .logout-link:hover {
            background: rgba(231, 76, 60, 1);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Добро пожаловать, {{ username }}!</h1>
        <p>Выберите предмет, чтобы начать тестирование:</p>
    </div>

    <div class="grid">
        <a href="{{ url_for('quiz', subject='english') }}" class="card">
            <div class="icon">🇬🇧</div>
            <h3>Английский язык</h3>
            <div class="btn-start">Перейти</div>
        </a>

        <a href="{{ url_for('quiz', subject='architecture') }}" class="card">
            <div class="icon">🏛</div>
            <h3>Архитектура</h3>
            <div class="btn-start">Перейти</div>
        </a>

        <a href="{{ url_for('quiz', subject='philosophy') }}" class="card">
            <div class="icon">📜</div>
            <h3>Философия</h3>
            <div class="btn-start">Перейти</div>
        </a>

        <a href="{{ url_for('quiz', subject='java') }}" class="card">
            <div class="icon">☕️</div>
            <h3>Java Программирование</h3>
            <div class="btn-start">Перейти</div>
        </a>

        <a href="{{ url_for('quiz', subject='algorithms') }}" class="card">
            <div class="icon">💻</div>
            <h3>Алгоритмы</h3>
            <div class="btn-start">Перейти</div>
        </a>

        <a href="{{ url_for('quiz', subject='ktm') }}" class="card">
            <div class="icon">📅</div>
            <h3>КТМ</h3>
            <div class="btn-start">Перейти</div>
        </a>
    </div>

    <a href="{{ url_for('logout') }}" class="logout-link">Выйти из аккаунта</a>
</body>
</html>
