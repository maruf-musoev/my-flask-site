<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему — 40010108</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            /* Ссылка на картинку со стадионом */
            background: url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=1350&q=80') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .top-nav {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            color: white;
            font-size: 14px;
            text-shadow: 1px 1px 2px black;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 40px;
            width: 320px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            color: #222;
            margin-bottom: 25px;
            font-size: 28px;
        }

        .error-msg {
            color: red;
            background: rgba(255,0,0,0.1);
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 16px;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #0066ff;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #0044cc;
        }

        .register-link {
            margin-top: 20px;
            display: block;
            color: #0055ff;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <div>только для группы 40010108</div>
        <div>dushanbe-2026</div>
    </div>

    <div class="login-card">
        <h1>Тестирование</h1>

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form action="{{ url_for('login') }}" method="post">
            <input type="text" name="username" placeholder="Ваше имя" required>
            <input type="password" name="password" placeholder="Ваш код (пароль)" required>
            <button type="submit" class="btn-login">Войти</button>
        </form>
        
        <a href="{{ url_for('register') }}" class="register-link">Нет аккаунта? Зарегистрироваться</a>
    </div>

</body>
</html>
